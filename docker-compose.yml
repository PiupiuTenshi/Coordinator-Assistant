services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medical-symptom-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: medical-symptom-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
